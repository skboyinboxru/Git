apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-exchange
spec:
  replicas: 1  
  selector:
    matchLabels:
      app: data-exchange  
  template:
    metadata:
      labels:
        app: data-exchange  
    spec:
      containers:
      - name: writer  
        image: busybox
        command: ["/bin/sh", "-c"]
        args: ["while true; do echo $(date) > /shared/data.txt; sleep 5; done"]  # КЛЮЧЕВОЕ: Команда записи данных в файл
        volumeMounts:
        - name: shared-storage  
          mountPath: /shared  
      - name: reader  
        image: wbitt/network-multitool
        command: ["/bin/sh", "-c"]
        args: ["tail -f /shared/data.txt"]  
        volumeMounts:
        - name: shared-storage  
          mountPath: /shared  
      volumes:
      - name: shared-storage  
        emptyDir: {}