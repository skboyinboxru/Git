apiVersion: v1
kind: ConfigMap
metadata:
  name: web-content
  namespace: default
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <head>
      <title>Страница из ConfigMap</title>
    </head>
    <body>
      <h1>Привет от Kubernetes!</h1>
      <p>Это веб-страница, подключенная через ConfigMap</p>
      <p>Приложение работает с двумя контейнерами: nginx + multitool</p>
    </body>
    </html>